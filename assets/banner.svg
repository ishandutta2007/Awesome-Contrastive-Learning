<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f24" />
      <stop offset="50%" stop-color="#141b41" />
      <stop offset="100%" stop-color="#050814" />
    </linearGradient>

    <!-- Node Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Positive Connection Glow -->
    <linearGradient id="pos-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Negative Connection Glow -->
    <linearGradient id="neg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0844" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Animated Grid / Particles in Background -->
  <g opacity="0.15">
    <circle cx="100" cy="100" r="1" fill="#fff" />
    <circle cx="300" cy="150" r="1.5" fill="#fff" />
    <circle cx="900" cy="80" r="1" fill="#fff" />
    <circle cx="1100" cy="300" r="2" fill="#fff" />
    <circle cx="200" cy="350" r="1" fill="#fff" />
  </g>

  <!-- Title Text -->
  <g transform="translate(600, 160)" text-anchor="middle">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="54" fill="#ffffff" letter-spacing="4" filter="url(#glow)">
      AWESOME CONTRASTIVE LEARNING
    </text>
    <text y="50" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="20" fill="#a0aec0" letter-spacing="2">
      A Curated List of History, Progression, Loss Variants &amp; Applications
    </text>
  </g>

  <!-- Dynamic Concept Representation (Visualizing Contrastive Learning) -->
  <!-- Left Side: Positive Pair Pulling Together -->
  <g transform="translate(200, 200)">
    <!-- Connection Line -->
    <line x1="-50" y1="0" x2="50" y2="0" stroke="url(#pos-grad)" stroke-width="4" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" values="150;0" dur="4s" repeatCount="indefinite" />
    </line>
    
    <!-- Anchor Node -->
    <circle cx="-50" cy="0" r="20" fill="#00f2fe" filter="url(#glow)">
      <animate attributeName="r" values="20;24;20" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Positive Node -->
    <circle cx="50" cy="0" r="20" fill="#4facfe" filter="url(#glow)">
      <animate attributeName="r" values="20;24;20" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cx" values="50;40;50" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <text y="-35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00f2fe" font-weight="bold">POSITIVE (PULL)</text>
  </g>

  <!-- Right Side: Negative Pair Pushing Apart -->
  <g transform="translate(1000, 200)">
    <!-- Connection Line (broken) -->
    <line x1="-70" y1="0" x2="70" y2="0" stroke="url(#neg-grad)" stroke-width="2" stroke-dasharray="5 5" />
    
    <!-- Anchor Node -->
    <circle cx="-70" cy="0" r="20" fill="#00f2fe" filter="url(#glow)">
      <animate attributeName="r" values="20;18;20" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Negative Node -->
    <circle cx="70" cy="0" r="20" fill="#ff0844" filter="url(#glow)">
      <animate attributeName="r" values="20;18;20" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cx" values="70;90;70" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <text y="-35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff0844" font-weight="bold">NEGATIVE (PUSH)</text>
  </g>
</svg>
